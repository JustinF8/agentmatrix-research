services:
  - type: web
    name: factor-lab-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-factor-lab.txt
    startCommand: gunicorn backend.factor_lab_api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FACTOR_LAB_PUBLIC_ORIGIN
        value: https://justinf8.github.io/agentmatrix-research
      - key: FACTOR_LAB_QUANT_API_TOKEN
        sync: false
